# -------------------------------------------------------------------
# GitHub Actions workflow for the libcftext library.
#
# Build + Test on every push/PR to master.
# On version tags (v*), a release is created with:
#   - Pre-built static library (libcftext.a)
#   - Command-line tool (libftext)
#   - SHA256 checksums for all assets
#
# -------------------------------------------------------------------
name: Build, Test, and Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  # ===================================================================
  # Build & Test Matrix (Ubuntu + macOS)
  # ===================================================================
  build:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      ARTIFACT_NAME: libcftext-${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build library and example tool
        run: make

      # --- Smoke tests -------------------------------------------------
      - name: Create test files
        run: |
          echo "Hello, world!" > test_text.txt
          printf 'Hello\x00World' > test_binary.bin

      - name: Test text detection
        run: |
          output=$(./libftext test_text.txt)
          if [ "$output" != "text" ]; then
            echo "ERROR: Expected 'text' but got '$output'"
            exit 1
          fi

      - name: Test binary detection
        run: |
          output=$(./libftext test_binary.bin)
          if [ "$output" != "binary" ]; then
            echo "ERROR: Expected 'binary' but got '$output'"
            exit 1
          fi

      - name: Test missing file (should fail)
        run: |
          set +e
          ./libftext nonexistent.txt > /dev/null 2>&1
          exit_code=$?
          set -e
          if [ $exit_code -eq 0 ]; then
            echo "ERROR: Expected non-zero exit code for missing file"
            exit 1
          fi

      - name: Test version output
        run: |
          ./libftext 2>&1 | grep -q "Version: 1.0.2" || {
            echo "ERROR: Version string not found in output"
            exit 1
          }

      # --- Prepare and upload artifacts ---------------------------------
      - name: Prepare artifact folder
        run: |
          mkdir -p artifact
          cp libcftext.a artifact/
          cp libftext artifact/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifact/

      - name: Clean up
        run: make clean

  # ===================================================================
  # Release Job (only on version tags)
  # ===================================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display artifact structure
        run: |
          echo "Downloaded artifacts:"
          ls -R

      - name: Generate SHA256 checksums
        run: |
          for dir in libcftext-ubuntu-latest libcftext-macos-latest; do
            if [ -d "$dir" ]; then
              echo "Generating checksums for $dir..."
              cd "$dir"
              sha256sum * > SHA256SUMS
              cat SHA256SUMS
              cd ..
            else
              echo "WARNING: $dir not found, skipping."
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            libcftext-ubuntu-latest/*
            libcftext-macos-latest/*
          body: |
            ## LibCFText Release ${{ github.ref_name }}

            Pre-built static library and command-line tool for:
            - Linux (x86_64)
            - macOS (x86_64 / arm64)

            ### SHA256 Checksums
            See `SHA256SUMS` inside each platform folder.
