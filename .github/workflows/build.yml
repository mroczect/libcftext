# -------------------------------------------------------------------
# GitHub Actions workflow for the libcftext library.
#
# Build + Test on every push/PR to master.
# On version tags (v*), a release is created with:
#   - Per-platform ZIP archives containing libcftext.a and libftext
#   - A single SHA256SUMS file for integrity verification
#
# The workflow is stable and handles duplicate file names by
# packaging each OS artifact into a uniquely named ZIP.
# -------------------------------------------------------------------
name: Build, Test, and Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  # ===================================================================
  # Build & Test Matrix (Ubuntu + macOS)
  # ===================================================================
  build:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      ARTIFACT_NAME: libcftext-${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build library and example tool
        run: make

      # --- Smoke tests -------------------------------------------------
      - name: Create test files
        run: |
          echo "Hello, world!" > test_text.txt
          printf 'Hello\x00World' > test_binary.bin

      - name: Test text detection
        run: |
          output=$(./libftext test_text.txt)
          if [ "$output" != "text" ]; then
            echo "ERROR: Expected 'text' but got '$output'"
            exit 1
          fi

      - name: Test binary detection
        run: |
          output=$(./libftext test_binary.bin)
          if [ "$output" != "binary" ]; then
            echo "ERROR: Expected 'binary' but got '$output'"
            exit 1
          fi

      - name: Test missing file (should fail)
        run: |
          set +e
          ./libftext nonexistent.txt > /dev/null 2>&1
          exit_code=$?
          set -e
          if [ $exit_code -eq 0 ]; then
            echo "ERROR: Expected non-zero exit code for missing file"
            exit 1
          fi

      - name: Test version output
        run: |
          # Make sure this version matches the one in the source code
          ./libftext 2>&1 | grep -q "Version: 1.0.6" || {
            echo "ERROR: Version string not found in output"
            exit 1
          }

      # --- Prepare and upload artifacts ---------------------------------
      - name: Prepare artifact folder
        run: |
          mkdir -p artifact
          cp libcftext.a artifact/
          cp libftext artifact/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifact/

      - name: Clean up
        run: make clean

  # ===================================================================
  # Release Job (only on version tags)
  # ===================================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ---------------------------------------------------------------
      # Download the artifacts from the build job.
      # They will be placed in directories named after the artifact.
      # ---------------------------------------------------------------
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      # ---------------------------------------------------------------
      # Show the directory tree for debugging purposes.
      # ---------------------------------------------------------------
      - name: Display artifact structure
        run: |
          echo "Downloaded artifacts:"
          ls -R

      # ---------------------------------------------------------------
      # Package each OS folder into a separate ZIP file.
      # This avoids duplicate file names when uploading to the release.
      # ---------------------------------------------------------------
      - name: Package each platform into a ZIP archive
        run: |
          for dir in libcftext-ubuntu-latest libcftext-macos-latest; do
            if [ -d "$dir" ]; then
              echo "Packaging $dir..."
              (cd "$dir" && zip -r "../${dir}.zip" .)
            else
              echo "WARNING: $dir not found, skipping."
            fi
          done
          echo "Created ZIP archives:"
          ls -lh *.zip

      # ---------------------------------------------------------------
      # Generate a single SHA256SUMS file containing checksums
      # of all ZIP archives (not the individual files).
      # ---------------------------------------------------------------
      - name: Generate SHA256 checksums for all ZIP archives
        run: |
          rm -f SHA256SUMS
          for zipfile in libcftext-*.zip; do
            if [ -f "$zipfile" ]; then
              sha256sum "$zipfile" >> SHA256SUMS
            fi
          done
          echo "Checksums generated:"
          cat SHA256SUMS

      # ---------------------------------------------------------------
      # Create the GitHub Release and upload the ZIPs + SHA256SUMS.
      # Using ncipollo/release-action for better reliability.
      # ---------------------------------------------------------------
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          artifacts: "libcftext-*.zip,SHA256SUMS"
          body: |
            ## LibCFText Release ${{ github.ref_name }}

            Pre-built static library and command-line tool for:
            - Linux (x86_64) → `libcftext-ubuntu-latest.zip`
            - macOS (x86_64 / arm64) → `libcftext-macos-latest.zip`

            ### SHA256 Checksums
            See the `SHA256SUMS` file for integrity verification.
