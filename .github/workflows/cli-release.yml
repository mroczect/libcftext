name: CLI Release

on:
  workflow_dispatch:
  push:
    tags:
      - "cli-v*"

jobs:
  build-cli:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      BINARY_NAME: libftext
      ARTIFACT_NAME: libftext-${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build CLI tool
        run: make

      - name: Smoke test the binary
        run: |
          echo "test" > /tmp/test.txt
          output=$(./libftext /tmp/test.txt)
          if [ "$output" != "text" ]; then
            echo "ERROR: CLI test failed"
            exit 1
          fi

      - name: Prepare binary for upload
        run: |
          mkdir -p upload
          cp libftext upload/
          tar -czf libftext-${{ matrix.os }}.tar.gz -C upload libftext

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: libftext-${{ matrix.os }}.tar.gz

  generate-installer:
    needs: build-cli
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/cli-v')
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      REPO: ${{ github.repository }}
    steps:
      - name: Create installer.sh
        run: |
          cat << 'EOF' > installer.sh
          #!/usr/bin/env bash
          set -euo pipefail

          INSTALL_DIR="${INSTALL_DIR:-/usr/local/bin}"
          OS="$(uname -s)"
          ARCH="$(uname -m)"

          case "$OS" in
              Linux)  PLATFORM="ubuntu-latest" ;;
              Darwin) PLATFORM="macos-latest" ;;
              *)
                  echo "Unsupported OS: $OS"
                  exit 1
                  ;;
          esac

          RELEASE_TAG="__RELEASE_TAG__"
          BASE_URL="https://github.com/__GITHUB_REPOSITORY__/releases/download/${RELEASE_TAG}"
          FILENAME="libftext-${PLATFORM}.tar.gz"

          echo "Downloading $FILENAME from $BASE_URL ..."
          curl -fsSL "${BASE_URL}/${FILENAME}" -o "/tmp/${FILENAME}"

          echo "Extracting..."
          tar -xzf "/tmp/${FILENAME}" -C /tmp/

          echo "Installing libftext to ${INSTALL_DIR} ..."
          sudo install -m 755 /tmp/libftext "${INSTALL_DIR}/libftext"

          if command -v libftext >/dev/null 2>&1; then
              echo "libftext installed successfully!"
              libftext --version 2>&1 || true
          else
              echo "Installation failed."
              exit 1
          fi
          EOF
          chmod +x installer.sh

      - name: Inject placeholders into installer
        run: |
          sed -i "s|__RELEASE_TAG__|${RELEASE_TAG}|g" installer.sh
          sed -i "s|__GITHUB_REPOSITORY__|${REPO}|g" installer.sh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: installer.sh

  release:
    if: startsWith(github.ref, 'refs/tags/cli-v') || github.event_name == 'workflow_dispatch'
    needs: [build-cli, generate-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display structure
        run: ls -R

      - name: Create Release
        uses: ncipollo/release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ github.ref_name }}
          artifacts: "libftext-*/*.tar.gz,installer/installer.sh"
          body: |
            ## LibCFText CLI Release ${{ github.ref_name }}

            Pre-built command-line tool for:
            - Linux (x86_64) → `libftext-ubuntu-latest.tar.gz`
            - macOS (x86_64 / arm64) → `libftext-macos-latest.tar.gz`

            ### Quick install
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/installer.sh | bash
